<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Snake Game 💥</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="game-container">
    <h1>🐍 Snake Game</h1>

    <div class="score-board">
      <span id="score">Score: 0</span>
      <span id="highScore">High Score: 0</span>
    </div>

    <canvas id="game" width="400" height="400"></canvas>

    <p class="controls">
      Use ⬅️⬆️➡️⬇️ or touch controls
    </p>

    <!-- Mobile Controls -->
    <div class="mobile-controls">
      <button onclick="setDirection('up')">⬆️</button>
      <div>
        <button onclick="setDirection('left')">⬅️</button>
        <button onclick="setDirection('down')">⬇️</button>
        <button onclick="setDirection('right')">➡️</button>
      </div>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
